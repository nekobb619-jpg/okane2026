<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>流動帳 | Money Flow Score</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root{
  --bg:#15171a;
  --panel:#1c1f24;
  --panel2:#22262c;
  --border:#2b2f36;
  --text:#e8e6e1;
  --dim:#8b9099;
  --dim2:#5f6570;
  --jade:#4fb286;
  --jade-dim:#2f6b52;
  --coral:#c97b4a;
  --coral-dim:#8a5333;
  --steel:#5b8dbf;
  --steel-dim:#3a5c7a;
  --gold:#d4a94e;
  --gold-dim:#8a6f34;
  --danger:#c75c5c;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
.mono{font-family:'JetBrains Mono',monospace;}
.serif{font-family:'Instrument Serif',serif;}

/* ---------- shell ---------- */
.app{max-width:920px;margin:0 auto;padding:20px 16px 80px;}
.header{
  display:flex;justify-content:space-between;align-items:flex-end;
  margin-bottom:18px;flex-wrap:wrap;gap:12px;
}
.eyebrow{
  font-size:11px;letter-spacing:.18em;color:var(--dim2);
  text-transform:uppercase;margin:0 0 2px;
}
.title{
  font-family:'Instrument Serif',serif;font-size:34px;font-style:italic;
  margin:0;color:var(--text);line-height:1;
}
.month-picker{
  display:flex;align-items:center;gap:8px;
  background:var(--panel);border:1px solid var(--border);
  border-radius:10px;padding:6px 10px;
}
.month-picker button{
  background:none;border:none;color:var(--dim);font-size:16px;cursor:pointer;
  padding:2px 6px;border-radius:6px;
}
.month-picker button:hover{background:var(--panel2);color:var(--text);}
.month-picker .mval{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--text);min-width:78px;text-align:center;}

.tabs{
  display:flex;gap:4px;border-bottom:1px solid var(--border);
  margin-bottom:20px;overflow-x:auto;
}
.tab-btn{
  background:none;border:none;color:var(--dim);font-family:'Inter',sans-serif;
  font-size:13.5px;font-weight:500;padding:10px 14px;cursor:pointer;
  border-bottom:2px solid transparent;white-space:nowrap;
}
.tab-btn.active{color:var(--text);border-bottom-color:var(--jade);}
.tab-btn:hover:not(.active){color:var(--text);}

.panel{
  background:var(--panel);border:1px solid var(--border);
  border-radius:14px;padding:18px;margin-bottom:16px;
}
.panel h3{
  margin:0 0 14px;font-size:13px;font-weight:600;color:var(--dim);
  letter-spacing:.04em;text-transform:uppercase;
}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
@media(max-width:640px){.grid3{grid-template-columns:repeat(2,1fr);} .grid2{grid-template-columns:1fr;}}

/* ---------- score ---------- */
.score-row{display:flex;gap:20px;align-items:center;flex-wrap:wrap;}
.score-ring-wrap{position:relative;width:132px;height:132px;flex-shrink:0;}
.score-num{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}
.score-num .n{font-family:'Instrument Serif',serif;font-size:44px;font-style:italic;line-height:1;}
.score-num .lbl{font-size:9px;color:var(--dim2);letter-spacing:.12em;margin-top:2px;text-transform:uppercase;}
.score-breakdown{flex:1;min-width:200px;display:flex;flex-direction:column;gap:10px;}
.sb-row{display:flex;align-items:center;gap:10px;}
.sb-label{font-size:12px;color:var(--dim);width:112px;flex-shrink:0;}
.sb-bar{flex:1;height:6px;background:var(--panel2);border-radius:4px;overflow:hidden;}
.sb-fill{height:100%;border-radius:4px;}
.sb-val{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--dim);width:38px;text-align:right;flex-shrink:0;}

/* ---------- pulse chart ---------- */
.pulse-wrap{position:relative;}
canvas#pulseCanvas{width:100%;height:140px;display:block;}
.pulse-legend{display:flex;gap:16px;font-size:11px;color:var(--dim);margin-top:8px;}
.pulse-legend span{display:inline-flex;align-items:center;gap:5px;}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;}

/* ---------- kpi cards ---------- */
.kpi-card{background:var(--panel2);border-radius:10px;padding:12px 14px;}
.kpi-label{font-size:11px;color:var(--dim);margin-bottom:6px;}
.kpi-val{font-family:'JetBrains Mono',monospace;font-size:19px;font-weight:600;}
.pos{color:var(--jade);} .neg{color:var(--coral);} .neutral{color:var(--text);}

/* ---------- category bars ---------- */
.cat-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.cat-bar-label{font-size:12.5px;width:88px;flex-shrink:0;color:var(--dim);}
.cat-bar-track{flex:1;height:16px;background:var(--panel2);border-radius:5px;overflow:hidden;}
.cat-bar-fill{height:100%;border-radius:5px;}
.cat-bar-amt{font-family:'JetBrains Mono',monospace;font-size:12px;width:88px;text-align:right;color:var(--dim);}

/* ---------- forms ---------- */
label{font-size:12px;color:var(--dim);display:block;margin-bottom:4px;}
input[type=text],input[type=number],input[type=date],input[type=month],select,textarea{
  width:100%;background:var(--panel2);border:1px solid var(--border);
  color:var(--text);border-radius:8px;padding:8px 10px;font-size:13.5px;
  font-family:'Inter',sans-serif;
}
input:focus,select:focus,textarea:focus{outline:2px solid var(--jade-dim);outline-offset:1px;}
.field{margin-bottom:12px;}
.btn{
  background:var(--jade);color:#0f1512;border:none;border-radius:8px;
  padding:9px 16px;font-size:13.5px;font-weight:600;cursor:pointer;
}
.btn:hover{background:#5fc296;}
.btn.secondary{background:var(--panel2);color:var(--text);border:1px solid var(--border);}
.btn.secondary:hover{background:var(--border);}
.btn.danger{background:var(--panel2);color:var(--coral);border:1px solid var(--coral-dim);}
.btn.small{padding:5px 10px;font-size:12px;}
.btn:focus-visible,.tab-btn:focus-visible,select:focus-visible,input:focus-visible{outline:2px solid var(--jade);outline-offset:2px;}
.form-row{display:flex;gap:10px;flex-wrap:wrap;}
.form-row>.field{flex:1;min-width:110px;}

/* ---------- table ---------- */
table{width:100%;border-collapse:collapse;font-size:13px;}
th{
  text-align:left;font-size:11px;color:var(--dim2);text-transform:uppercase;
  letter-spacing:.05em;padding:6px 8px;border-bottom:1px solid var(--border);
}
td{padding:8px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
.type-tag{
  font-size:10.5px;padding:2px 7px;border-radius:20px;font-weight:600;
  display:inline-block;
}
.type-income{background:rgba(79,178,134,.15);color:var(--jade);}
.type-fixed{background:rgba(201,123,74,.15);color:var(--coral);}
.type-variable{background:rgba(91,141,191,.15);color:var(--steel);}
.type-savings{background:rgba(212,169,78,.15);color:var(--gold);}
.row-actions{display:flex;gap:6px;}
.icon-btn{
  background:none;border:none;color:var(--dim2);cursor:pointer;font-size:13px;
  padding:2px 5px;
}
.icon-btn:hover{color:var(--text);}

.empty-state{text-align:center;padding:36px 20px;color:var(--dim2);font-size:13px;}
.filter-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:flex-end;}
.filter-row .field{margin-bottom:0;min-width:130px;}

.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;
  align-items:center;justify-content:center;z-index:100;padding:16px;
}
.modal-overlay.open{display:flex;}
.modal{
  background:var(--panel);border:1px solid var(--border);border-radius:14px;
  padding:20px;max-width:480px;width:100%;max-height:86vh;overflow-y:auto;
}
.modal h3{margin-top:0;}
.modal-close-row{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;}

.progress-track{height:10px;background:var(--panel2);border-radius:6px;overflow:hidden;margin:10px 0;}
.progress-fill{height:100%;border-radius:6px;background:var(--gold);}

.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:var(--panel2);border:1px solid var(--border);color:var(--text);
  padding:10px 18px;border-radius:10px;font-size:13px;z-index:200;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.toast.show{opacity:1;}

.help-text{font-size:11.5px;color:var(--dim2);margin-top:4px;line-height:1.5;}
.section-gap{margin-top:18px;}
.csv-preview{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--panel2);
  border-radius:8px;padding:10px;max-height:140px;overflow:auto;white-space:pre;color:var(--dim);}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalBody"></div>
</div>
<div class="toast" id="toast"></div>

<script>
/* =========================================================
   流動帳 - Money Flow Score
   単一HTMLファイル / vanilla JS / localStorage永続化
   ========================================================= */

const STORAGE_KEY = 'moneyFlowLedger_v1';
const DRIVE_CONFIG_KEY = 'moneyFlowLedger_driveConfig_v1';
const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.file';

function loadDriveConfig(){
  try{
    const raw = localStorage.getItem(DRIVE_CONFIG_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return { clientId: '', fileName: 'money-flow-score-data.json', fileId: null, lastSavedAt: null };
}
function saveDriveConfig(){
  localStorage.setItem(DRIVE_CONFIG_KEY, JSON.stringify(driveConfig));
}
let driveConfig = loadDriveConfig();
let driveAccessToken = null;
let driveTokenExpiry = 0;
let driveTokenClient = null;
let driveStatus = 'idle'; // idle | signing_in | saving | loading | error

const PAYMENT_METHODS_BY_TYPE = {
  income: ['銀行振込','現金','その他'],
  fixed: ['銀行引落','PayPayカード','現金','その他'],
  variable: ['PayPayカード','現金','その他'],
  savings: ['銀行振込','現金','その他'],
};
const PAYMENT_LABEL_BY_TYPE = {
  income: '受取方法',
  fixed: '支払方法',
  variable: '支払方法',
  savings: '方法',
};
function paymentMethodsFor(type){ return PAYMENT_METHODS_BY_TYPE[type] || PAYMENT_METHODS_BY_TYPE.variable; }
function paymentLabelFor(type){ return PAYMENT_LABEL_BY_TYPE[type] || '支払方法'; }
const TYPE_LABEL = {income:'収入', fixed:'固定費', variable:'変動費', savings:'貯蓄'};
const TYPE_COLOR = {income:'var(--jade)', fixed:'var(--coral)', variable:'var(--steel)', savings:'var(--gold)'};

function defaultCategories(){
  return [
    {id:'inc_salary', name:'給与', type:'income'},
    {id:'inc_bonus', name:'賞与', type:'income'},
    {id:'inc_other', name:'その他収入', type:'income'},
    {id:'fix_mortgage', name:'住宅ローン', type:'fixed'},
    {id:'fix_insurance', name:'保険', type:'fixed'},
    {id:'fix_tax', name:'税金', type:'fixed'},
    {id:'fix_subscription', name:'サブスク', type:'fixed'},
    {id:'fix_juku', name:'塾代', type:'fixed'},
    {id:'fix_allowance', name:'妻子こづかい', type:'fixed'},
    {id:'var_food', name:'食費', type:'variable'},
    {id:'var_daily', name:'日用品', type:'variable'},
    {id:'var_eatout', name:'外食', type:'variable'},
    {id:'var_fun', name:'娯楽', type:'variable'},
    {id:'var_transport', name:'交通費', type:'variable'},
    {id:'var_medical', name:'医療', type:'variable'},
    {id:'var_other', name:'その他変動費', type:'variable'},
    {id:'sav_travel', name:'旅行貯蓄', type:'savings'},
    {id:'sav_other', name:'その他貯蓄', type:'savings'},
  ];
}

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      return normalizeLoadedState_(parsed);
    }
  }catch(e){ console.error('load failed', e); }
  return { categories: defaultCategories(), transactions: [], settings: {}, recurring: [], appliedRecurring: [], accounts: [], cards: [], transfers: [] };
}
function normalizeLoadedState_(parsed){
  if(!parsed.categories || !parsed.categories.length) parsed.categories = defaultCategories();
  if(!parsed.transactions) parsed.transactions = [];
  if(!parsed.settings) parsed.settings = {};
  if(!parsed.recurring) parsed.recurring = [];
  if(!parsed.appliedRecurring) parsed.appliedRecurring = [];
  if(!parsed.accounts) parsed.accounts = [];
  if(!parsed.cards) parsed.cards = [];
  if(!parsed.transfers) parsed.transfers = [];
  return parsed;
}

function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

/* ---------- Google Drive 保存/読込 ---------- */
function ensureGisLoaded(){
  return new Promise((resolve, reject)=>{
    if(window.google && google.accounts && google.accounts.oauth2){ resolve(); return; }
    let tries = 0;
    const iv = setInterval(()=>{
      tries++;
      if(window.google && google.accounts && google.accounts.oauth2){ clearInterval(iv); resolve(); }
      else if(tries > 100){ clearInterval(iv); reject(new Error('Googleログイン用ライブラリを読み込めませんでした')); }
    }, 100);
  });
}

async function ensureDriveAuth(){
  if(!driveConfig.clientId){ throw new Error('クライアントIDが未設定です'); }
  if(driveAccessToken && Date.now() < driveTokenExpiry - 5000) return driveAccessToken;
  await ensureGisLoaded();
  return new Promise((resolve, reject)=>{
    try{
      if(!driveTokenClient){
        driveTokenClient = google.accounts.oauth2.initTokenClient({
          client_id: driveConfig.clientId,
          scope: DRIVE_SCOPE,
          callback: ()=>{} // 呼び出しごとに上書きする
        });
      }
      driveTokenClient.callback = (resp)=>{
        if(resp && resp.access_token){
          driveAccessToken = resp.access_token;
          driveTokenExpiry = Date.now() + (resp.expires_in||3600) * 1000;
          resolve(driveAccessToken);
        } else {
          reject(new Error('Googleログインに失敗しました'));
        }
      };
      driveTokenClient.requestAccessToken({ prompt: driveAccessToken ? '' : 'consent' });
    }catch(err){
      reject(err);
    }
  });
}

function updateDriveStatus(status){
  driveStatus = status;
  const el = document.getElementById('driveStatusIndicator');
  if(!el) return;
  const map = {
    idle: {icon:'○', color:'var(--dim2)', label: driveConfig.fileId ? 'リンク済み' : '未リンク'},
    signing_in: {icon:'◐', color:'var(--gold)', label:'ログイン中…'},
    saving: {icon:'◐', color:'var(--gold)', label:'保存中…'},
    loading: {icon:'◐', color:'var(--gold)', label:'読込中…'},
    error: {icon:'⚠', color:'var(--coral)', label:'エラー'},
  };
  const m = map[status] || map.idle;
  el.innerHTML = `<span style="color:${m.color};font-size:11px;">${m.icon} ${m.label}</span>`;
}

async function driveFindFileByName(name){
  const token = await ensureDriveAuth();
  const safe = name.replace(/'/g, "\\'");
  const q = encodeURIComponent(`name = '${safe}' and trashed = false`);
  const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&spaces=drive&fields=files(id,name,modifiedTime)&orderBy=modifiedTime desc`, {
    headers: { Authorization: `Bearer ${token}` }
  });
  const json = await res.json();
  if(json.files && json.files.length) return json.files[0];
  return null;
}

async function driveSaveJson(){
  updateDriveStatus('saving');
  try{
    const token = await ensureDriveAuth();
    const fileName = (driveConfig.fileName||'').trim() || 'money-flow-score-data.json';
    driveConfig.fileName = fileName;
    const content = JSON.stringify(state, null, 2);
    let fileId = driveConfig.fileId;
    if(!fileId){
      const existing = await driveFindFileByName(fileName);
      if(existing) fileId = existing.id;
    }
    if(fileId){
      const res = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
        method: 'PATCH',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: content
      });
      if(!res.ok) throw new Error('保存に失敗しました(HTTP ' + res.status + ')');
      driveConfig.fileId = fileId;
    } else {
      const boundary = 'moneyflowscore_boundary_314159265';
      const metadata = { name: fileName, mimeType: 'application/json' };
      const multipartBody =
        `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n` +
        `--${boundary}\r\nContent-Type: application/json\r\n\r\n${content}\r\n` +
        `--${boundary}--`;
      const res = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': `multipart/related; boundary=${boundary}` },
        body: multipartBody
      });
      const json = await res.json();
      if(!json.id) throw new Error('新規作成に失敗しました');
      driveConfig.fileId = json.id;
    }
    driveConfig.lastSavedAt = new Date().toISOString();
    saveDriveConfig();
    updateDriveStatus('idle');
    return true;
  }catch(err){
    updateDriveStatus('error');
    toast('Google Driveへの保存に失敗しました: ' + err.message);
    return false;
  }
}

async function driveLoadJson(){
  updateDriveStatus('loading');
  try{
    const fileName = (driveConfig.fileName||'').trim() || 'money-flow-score-data.json';
    let fileId = driveConfig.fileId;
    if(!fileId){
      const existing = await driveFindFileByName(fileName);
      if(!existing) throw new Error(`「${fileName}」という名前のファイルが見つかりません`);
      fileId = existing.id;
      driveConfig.fileId = fileId;
      saveDriveConfig();
    }
    const token = await ensureDriveAuth();
    const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    if(!res.ok) throw new Error('読み込みに失敗しました(HTTP ' + res.status + ')');
    const json = await res.json();
    updateDriveStatus('idle');
    return json;
  }catch(err){
    updateDriveStatus('error');
    toast('Google Driveからの読み込みに失敗しました: ' + err.message);
    return null;
  }
}

let state = loadState();
let currentTab = 'dashboard';
let currentMonth = new Date().toISOString().slice(0,7);
let txFilter = { month: currentMonth, type: 'all', search: '', flaggedOnly: false };
let selectedTxIds = new Set();

function uid(){ return Math.random().toString(36).slice(2,10) + Date.now().toString(36); }
function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
function yen(n){ return '¥' + Math.round(n).toLocaleString('ja-JP'); }
function pct(n){ return Math.round(n*100) + '%'; }

function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=> el.classList.remove('show'), 2200);
}

function openModal(html){
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('modalBody').innerHTML = '';
}
document.getElementById('modalOverlay').addEventListener('click', (e)=>{
  if(e.target.id === 'modalOverlay') closeModal();
});

/* ---------- month helpers ---------- */
function shiftMonth(ym, delta){
  let [y,m] = ym.split('-').map(Number);
  m += delta;
  while(m<1){ m+=12; y--; }
  while(m>12){ m-=12; y++; }
  return y + '-' + String(m).padStart(2,'0');
}
function monthsBetween(a,b){
  const [ay,am] = a.split('-').map(Number);
  const [by,bm] = b.split('-').map(Number);
  return (by-ay)*12 + (bm-am);
}
function monthLabel(ym){
  const [y,m] = ym.split('-');
  return y + '年' + Number(m) + '月';
}
function getPastMonths(endYm, n){
  const arr = [];
  for(let i=n-1;i>=0;i--) arr.push(shiftMonth(endYm, -i));
  return arr;
}

/* ---------- data queries ---------- */
function catById(id){ return state.categories.find(c=>c.id===id); }
function txForMonth(ym){
  return state.transactions.filter(t=> t.date.slice(0,7) === ym);
}
function getMonthlyTotals(ym){
  const txs = txForMonth(ym);
  let income=0, fixed=0, variable=0, savings=0;
  txs.forEach(t=>{
    const cat = catById(t.categoryId);
    if(!cat) return;
    if(cat.type==='income') income += t.amount;
    else if(cat.type==='fixed') fixed += t.amount;
    else if(cat.type==='variable') variable += t.amount;
    else if(cat.type==='savings') savings += t.amount;
  });
  return { income, fixed, variable, savings, net: income - fixed - variable };
}
function sumTravelSavingsUpTo(ym){
  return state.transactions
    .filter(t=> t.categoryId === 'sav_travel' && t.date.slice(0,7) <= ym)
    .reduce((s,t)=> s + t.amount, 0);
}
function availableMonths(){
  const set = new Set(state.transactions.map(t=> t.date.slice(0,7)));
  set.add(currentMonth);
  return Array.from(set).sort();
}

/* ---------- travel goal ---------- */
function computeTravelProgress(ym){
  const goal = state.settings.travelGoal;
  if(!goal || !goal.amount || !goal.targetMonth) return null;
  const start = goal.startMonth || ym;
  const totalMonths = Math.max(1, monthsBetween(start, goal.targetMonth) + 1);
  const elapsedMonths = Math.max(1, monthsBetween(start, ym) + 1);
  const requiredPace = goal.amount / totalMonths;
  const savedSoFar = sumTravelSavingsUpTo(ym);
  const actualPace = savedSoFar / elapsedMonths;
  const onTrackRatio = requiredPace > 0 ? actualPace / requiredPace : 0;
  const monthsRemaining = Math.max(0, monthsBetween(ym, goal.targetMonth));
  return { savedSoFar, requiredPace, actualPace, onTrackRatio, monthsRemaining, totalMonths, goal };
}

/* ---------- composite score ---------- */
function computeScore(ym){
  const totals = getMonthlyTotals(ym);
  const savingsRate = totals.income > 0 ? totals.net / totals.income : 0;
  const aScore = clamp(savingsRate / 0.30, 0, 1) * 40;

  const fixedRatio = totals.income > 0 ? totals.fixed / totals.income : 0;
  const bScore = clamp((0.8 - fixedRatio) / 0.5, 0, 1) * 25;

  const pastMonths = getPastMonths(ym, 6);
  const nets = pastMonths
    .filter(m => txForMonth(m).length > 0)
    .map(m => getMonthlyTotals(m).net);
  let cScore;
  if(nets.length < 2){
    cScore = 10; // データ不足のため中立点
  } else {
    const mean = nets.reduce((s,v)=>s+v,0) / nets.length;
    const variance = nets.reduce((s,v)=> s + Math.pow(v-mean,2), 0) / nets.length;
    const sd = Math.sqrt(variance);
    const cv = mean !== 0 ? Math.abs(sd / mean) : (sd === 0 ? 0 : 2);
    cScore = clamp(1 - cv, 0, 1) * 20;
  }

  const travel = computeTravelProgress(ym);
  let dScore = null;
  let total;
  if(travel){
    dScore = clamp(travel.onTrackRatio, 0, 1) * 15;
    total = aScore + bScore + cScore + dScore;
  } else {
    total = (aScore + bScore + cScore) / 85 * 100;
  }

  return {
    total: Math.round(clamp(total,0,100)),
    components: {
      savings: {score: aScore, max: 40, label:'貯蓄率', raw: savingsRate},
      fixed: {score: bScore, max: 25, label:'固定費比率', raw: fixedRatio},
      stability: {score: cScore, max: 20, label:'安定性', raw: nets.length},
      travel: {score: dScore, max: 15, label:'旅行貯蓄', raw: travel}
    },
    totals
  };
}
function scoreColor(score){
  if(score >= 75) return 'var(--jade)';
  if(score >= 50) return 'var(--gold)';
  return 'var(--coral)';
}

/* ---------- 月々の余力(サブスク追加シミュレーション) ---------- */
// カテゴリの「見込み月額」を求める:定期取引があればその合計、無ければ予算目安、それも無ければ過去実績の平均
// 頻度が「指定した月のみ」(賞与など)の場合は、年間発生額を12ヶ月で按分した平均額として扱う
function categoryRecurringMonthlyTotal(categoryId){
  return state.recurring
    .filter(r=>r.active !== false && r.categoryId === categoryId)
    .reduce((s,r)=>{
      if(r.frequency === 'yearly'){
        const occurrences = (r.months||[]).length;
        return s + (r.amount * occurrences / 12);
      }
      return s + r.amount;
    }, 0);
}
function categoryHistoricalAverage(categoryId, monthsBack){
  monthsBack = monthsBack || 3;
  const months = getPastMonths(todayStr().slice(0,7), monthsBack);
  const sums = months
    .filter(ym => txForMonth(ym).some(t=>t.categoryId===categoryId))
    .map(ym => txForMonth(ym).filter(t=>t.categoryId===categoryId).reduce((s,t)=>s+t.amount,0));
  if(!sums.length) return 0;
  return sums.reduce((s,v)=>s+v,0) / sums.length;
}
function categoryPlannedMonthly(cat){
  const recurringTotal = categoryRecurringMonthlyTotal(cat.id);
  if(recurringTotal > 0) return { amount: recurringTotal, source: '定期取引' };
  if(cat.monthlyBudget) return { amount: cat.monthlyBudget, source: '予算目安' };
  const avg = categoryHistoricalAverage(cat.id, 3);
  if(avg > 0) return { amount: avg, source: '過去3ヶ月平均' };
  return { amount: 0, source: 'データなし' };
}
function computeMonthlyHeadroom(){
  let plannedIncome = 0, plannedExpense = 0;
  const breakdown = [];
  state.categories.forEach(cat=>{
    const planned = categoryPlannedMonthly(cat);
    if(planned.amount <= 0) return;
    if(cat.type === 'income') plannedIncome += planned.amount;
    else plannedExpense += planned.amount;
    breakdown.push({ cat, ...planned });
  });
  return { plannedIncome, plannedExpense, headroom: plannedIncome - plannedExpense, breakdown };
}

function drawScoreHistoryChart(){
  const canvas = document.getElementById('scoreHistoryCanvas');
  if(!canvas) return;
  const months = getPastMonths(currentMonth, 12);
  const scores = months.map(m => txForMonth(m).length > 0 ? computeScore(m).total : null);

  const dpr = window.devicePixelRatio || 1;
  const cssW = canvas.clientWidth || canvas.parentElement.clientWidth;
  const cssH = 120;
  canvas.width = cssW * dpr;
  canvas.height = cssH * dpr;
  canvas.style.height = cssH + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0,0,cssW,cssH);

  const padX = 10, padY = 14;
  const w = cssW - padX*2;
  const h = cssH - padY*2;
  const stepX = months.length > 1 ? w / (months.length - 1) : 0;

  // 50点ライン(目安)
  const y50 = padY + h - (50/100)*h;
  ctx.strokeStyle = 'rgba(139,144,153,.25)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(padX, y50);
  ctx.lineTo(padX + w, y50);
  ctx.stroke();

  const points = scores.map((s,i)=>({
    x: padX + stepX * i,
    y: s === null ? null : padY + h - (s/100)*h,
    v: s
  }));

  ctx.beginPath();
  let started = false;
  points.forEach(p=>{
    if(p.y === null){ started = false; return; }
    if(!started){ ctx.moveTo(p.x,p.y); started = true; } else { ctx.lineTo(p.x,p.y); }
  });
  ctx.strokeStyle = 'rgba(232,230,225,.55)';
  ctx.lineWidth = 1.6;
  ctx.stroke();

  points.forEach(p=>{
    if(p.v === null) return;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI*2);
    ctx.fillStyle = scoreColor(p.v);
    ctx.fill();
  });

  ctx.fillStyle = 'rgba(139,144,153,.8)';
  ctx.font = '10px JetBrains Mono, monospace';
  ctx.textAlign = 'center';
  months.forEach((m, idx)=>{
    if(idx % 2 === 0){
      const [,mm] = m.split('-');
      ctx.fillText(Number(mm) + '月', points[idx].x, cssH - 2);
    }
  });
}

  const nets = months.map(m => getMonthlyTotals(m).net);
  const dpr = window.devicePixelRatio || 1;
  const cssW = canvas.clientWidth || canvas.parentElement.clientWidth;
  const cssH = 140;
  canvas.width = cssW * dpr;
  canvas.height = cssH * dpr;
  canvas.style.height = cssH + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0,0,cssW,cssH);

  const padX = 10, padY = 16;
  const w = cssW - padX*2;
  const h = cssH - padY*2;
  const maxAbs = Math.max(1, ...nets.map(n=>Math.abs(n)));
  const zeroY = padY + h/2;

  // baseline
  ctx.strokeStyle = 'rgba(139,144,153,.25)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(padX, zeroY);
  ctx.lineTo(padX + w, zeroY);
  ctx.stroke();

  const stepX = nets.length > 1 ? w / (nets.length - 1) : 0;
  const points = nets.map((n,i)=>({
    x: padX + stepX * i,
    y: zeroY - (n / maxAbs) * (h/2 - 6),
    v: n
  }));

  // line
  ctx.beginPath();
  points.forEach((p,i)=>{ i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y); });
  ctx.strokeStyle = 'rgba(232,230,225,.55)';
  ctx.lineWidth = 1.6;
  ctx.stroke();

  // points
  points.forEach((p, idx)=>{
    const hasData = txForMonth(months[idx]).length > 0;
    ctx.beginPath();
    ctx.arc(p.x, p.y, hasData ? 3.4 : 2, 0, Math.PI*2);
    ctx.fillStyle = !hasData ? 'rgba(139,144,153,.4)' : (p.v >= 0 ? '#4fb286' : '#c97b4a');
    ctx.fill();
  });

  // month labels (every 2nd month to avoid crowding)
  ctx.fillStyle = 'rgba(139,144,153,.8)';
  ctx.font = '10px JetBrains Mono, monospace';
  ctx.textAlign = 'center';
  points.forEach((p, idx)=>{
    if(idx % 2 === 0){
      const [,m] = months[idx].split('-');
      ctx.fillText(Number(m) + '月', p.x, cssH - 2);
    }
  });
}

function renderTransactions(){
  const months = availableMonths();
  if(txFilter.month !== 'all' && !months.includes(txFilter.month)) txFilter.month = currentMonth;
  const baseTxs = txFilter.month === 'all' ? state.transactions.slice() : txForMonth(txFilter.month);
  const searchTerm = (txFilter.search||'').trim().toLowerCase();
  const txs = baseTxs
    .filter(t => txFilter.type === 'all' || catById(t.categoryId)?.type === txFilter.type)
    .filter(t => !txFilter.flaggedOnly || t.flagged)
    .filter(t => {
      if(!searchTerm) return true;
      const cat = catById(t.categoryId);
      const haystack = [t.memo, cat?.name, t.payment, paymentSourceLabel(t)].filter(Boolean).join(' ').toLowerCase();
      return haystack.includes(searchTerm);
    })
    .sort((a,b)=> b.date.localeCompare(a.date));

  const rows = txs.map(t=>{
    const cat = catById(t.categoryId);
    const srcLabel = paymentSourceLabel(t);
    return `
    <tr>
      <td><input type="checkbox" class="tx-select" data-txid="${t.id}" ${selectedTxIds.has(t.id)?'checked':''}></td>
      <td><button class="icon-btn" data-toggle-flag="${t.id}" title="フラグを${t.flagged?'外す':'立てる'}" style="opacity:${t.flagged?'1':'.3'};">🚩</button></td>
      <td class="mono">${t.date}</td>
      <td>${cat ? `<span class="type-tag type-${cat.type}">${cat.name}</span>` : '(削除済み)'}</td>
      <td class="mono">${yen(t.amount)}</td>
      <td>${t.payment||''}</td>
      <td style="font-size:12px;color:var(--dim);">${srcLabel||'—'}</td>
      <td style="color:var(--dim2);font-size:12px;">${t.memo||''}</td>
      <td>
        <div class="row-actions">
          <button class="icon-btn" data-edit="${t.id}" title="編集">✎</button>
          <button class="icon-btn" data-del="${t.id}" title="削除">✕</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  const flaggedCount = baseTxs.filter(t=>t.flagged).length;
  const pending = txFilter.month === 'all' ? 0 : pendingRecurringCount(txFilter.month);
  const visibleIds = txs.map(t=>t.id);
  const selCount = visibleIds.filter(id=>selectedTxIds.has(id)).length;
  const hasSourceOptions = state.accounts.length || state.cards.length;
  const unlinkedCount = txs.filter(t=>!t.accountId && !t.cardId).length;
  const uniquePayments = Array.from(new Set(txs.map(t=>t.payment).filter(Boolean)));

  return `
    ${pending > 0 ? `
    <div class="panel" style="border-color:var(--gold-dim);">
      <div class="filter-row" style="margin-bottom:0;">
        <span style="font-size:13px;color:var(--gold);">${monthLabel(txFilter.month)}の定期取引が${pending}件未反映です(給与・ローン引落など)</span>
        <button class="btn small" id="btnQuickApplyRecurring">今すぐ反映</button>
      </div>
    </div>` : ''}
    <div class="panel">
      <div class="filter-row">
        <div class="field">
          <label>対象月</label>
          <select id="txMonthFilter">
            <option value="all" ${txFilter.month==='all'?'selected':''}>すべての月</option>
            ${months.map(m=>`<option value="${m}" ${m===txFilter.month?'selected':''}>${monthLabel(m)}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>タイプ</label>
          <select id="txTypeFilter">
            <option value="all" ${txFilter.type==='all'?'selected':''}>すべて</option>
            <option value="income" ${txFilter.type==='income'?'selected':''}>収入</option>
            <option value="fixed" ${txFilter.type==='fixed'?'selected':''}>固定費</option>
            <option value="variable" ${txFilter.type==='variable'?'selected':''}>変動費</option>
            <option value="savings" ${txFilter.type==='savings'?'selected':''}>貯蓄</option>
          </select>
        </div>
        <div class="field">
          <label>名称検索</label>
          <input type="text" id="txSearchFilter" value="${txFilter.search||''}" placeholder="例: 旅行積立, イオン" style="min-width:140px;">
        </div>
        <button class="btn" id="btnAddTx">+ 取引を追加</button>
        <button class="btn secondary" id="btnCsvImport">CSVインポート(PayPayカード等)</button>
      </div>
      ${flaggedCount > 0 ? `
      <div class="filter-row" style="margin-top:2px;">
        <button class="btn ${txFilter.flaggedOnly?'':'secondary'} small" id="btnToggleFlaggedOnly">🚩 フラグ付きのみ表示(${flaggedCount}件)${txFilter.flaggedOnly ? ' ✓' : ''}</button>
      </div>` : ''}
      ${txs.length ? `
      <div class="filter-row" style="border-top:1px solid var(--border);padding-top:12px;margin-top:4px;flex-wrap:wrap;">
        ${hasSourceOptions && unlinkedCount > 0 ? `<span style="font-size:12px;color:var(--gold);">支払元が未設定の取引が${unlinkedCount}件あります</span>
        <button class="btn secondary small" id="btnSelectUnlinked">未設定の取引をすべて選択</button>` : ''}
        ${uniquePayments.length ? `
        <select id="selectByPaymentValue" style="max-width:160px;">
          ${uniquePayments.map(p=>`<option value="${p}">${p}</option>`).join('')}
        </select>
        <button class="btn secondary small" id="btnSelectByPayment">この支払方法を選択</button>` : ''}
        ${selCount > 0 ? `
          <span style="font-size:12px;color:var(--dim);">${selCount}件選択中</span>
          ${hasSourceOptions ? `<select id="bulkPaymentSource" style="max-width:200px;">${paymentSourceOptionsHtml('', '')}</select>
          <button class="btn small" id="btnApplyBulkSource">選択した取引に支払元を設定</button>` : ''}
          <button class="btn danger small" id="btnDeleteSelected">選択したすべてを削除</button>
          <button class="btn secondary small" id="btnClearSelection">選択解除</button>
        ` : ''}
      </div>` : ''}
      ${!hasSourceOptions && txs.length ? `<p class="help-text">「口座」「カード」タブで登録すると、CSVで取り込んだ過去の取引にも後からまとめて紐付けできます。</p>` : ''}
      ${txs.length ? `
      <table>
        <thead><tr><th><input type="checkbox" id="txSelectAll" ${selCount>0 && selCount===visibleIds.length?'checked':''}></th><th>🚩</th><th>日付</th><th>カテゴリ</th><th>金額</th><th>支払方法</th><th>支払元</th><th>メモ</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>` : `<div class="empty-state">この月の取引はまだありません。「+ 取引を追加」またはCSVインポートで記録を始めましょう。</div>`}
    </div>
  `;
}

function categoryOptionsGrouped(selectedId){
  const groups = ['income','fixed','variable','savings'];
  return groups.map(g=>{
    const opts = state.categories.filter(c=>c.type===g)
      .map(c=>`<option value="${c.id}" ${c.id===selectedId?'selected':''}>${c.name}</option>`).join('');
    return `<optgroup label="${TYPE_LABEL[g]}">${opts}</optgroup>`;
  }).join('');
}

function afterRenderTransactions(){
  const mf = document.getElementById('txMonthFilter');
  if(mf) mf.onchange = (e)=>{ txFilter.month = e.target.value; selectedTxIds.clear(); renderTabContent(); };
  const tf = document.getElementById('txTypeFilter');
  if(tf) tf.onchange = (e)=>{ txFilter.type = e.target.value; selectedTxIds.clear(); renderTabContent(); };
  const sf = document.getElementById('txSearchFilter');
  if(sf){
    let isComposing = false;
    const applySearch = (value)=>{
      txFilter.search = value;
      selectedTxIds.clear();
      renderTabContent();
      const el = document.getElementById('txSearchFilter');
      if(el){ el.focus(); const len = el.value.length; el.setSelectionRange(len, len); }
    };
    sf.addEventListener('compositionstart', ()=>{ isComposing = true; });
    sf.addEventListener('compositionend', (e)=>{ isComposing = false; applySearch(e.target.value); });
    sf.addEventListener('input', (e)=>{
      if(isComposing) return; // 漢字変換中は再描画しない(IMEの変換が中断されるため)
      applySearch(e.target.value);
    });
  }
  const addBtn = document.getElementById('btnAddTx');
  if(addBtn) addBtn.onclick = ()=> openTxForm();
  const csvBtn = document.getElementById('btnCsvImport');
  if(csvBtn) csvBtn.onclick = ()=> openCsvImportModal();
  const flaggedToggle = document.getElementById('btnToggleFlaggedOnly');
  if(flaggedToggle) flaggedToggle.onclick = ()=>{ txFilter.flaggedOnly = !txFilter.flaggedOnly; renderTabContent(); };
  document.querySelectorAll('[data-toggle-flag]').forEach(btn=>{
    btn.onclick = ()=>{
      const t = state.transactions.find(tx=>tx.id===btn.dataset.toggleFlag);
      if(t){ t.flagged = !t.flagged; saveState(); renderTabContent(); }
    };
  });
  const quickApply = document.getElementById('btnQuickApplyRecurring');
  if(quickApply) quickApply.onclick = ()=>{
    const { count, linked } = applyRecurringForMonth(txFilter.month);
    renderTabContent();
    toast(`${count}件反映しました${linked? `(${linked}件は取込済みのため紐付けのみ)`:''}`);
  };

  document.querySelectorAll('.tx-select').forEach(cb=>{
    cb.onchange = ()=>{
      if(cb.checked) selectedTxIds.add(cb.dataset.txid);
      else selectedTxIds.delete(cb.dataset.txid);
      renderTabContent();
    };
  });
  const selectAll = document.getElementById('txSelectAll');
  if(selectAll) selectAll.onchange = ()=>{
    document.querySelectorAll('.tx-select').forEach(cb=>{
      if(selectAll.checked) selectedTxIds.add(cb.dataset.txid);
      else selectedTxIds.delete(cb.dataset.txid);
    });
    renderTabContent();
  };
  const selectUnlinked = document.getElementById('btnSelectUnlinked');
  if(selectUnlinked) selectUnlinked.onclick = ()=>{
    document.querySelectorAll('.tx-select').forEach(cb=>{
      const t = state.transactions.find(tx=>tx.id===cb.dataset.txid);
      if(t && !t.accountId && !t.cardId) selectedTxIds.add(t.id);
    });
    renderTabContent();
  };
  const selectByPayment = document.getElementById('btnSelectByPayment');
  if(selectByPayment) selectByPayment.onclick = ()=>{
    const val = document.getElementById('selectByPaymentValue').value;
    document.querySelectorAll('.tx-select').forEach(cb=>{
      const t = state.transactions.find(tx=>tx.id===cb.dataset.txid);
      if(t && t.payment === val) selectedTxIds.add(t.id);
    });
    renderTabContent();
  };
  const clearSel = document.getElementById('btnClearSelection');
  if(clearSel) clearSel.onclick = ()=>{ selectedTxIds.clear(); renderTabContent(); };
  const deleteSelected = document.getElementById('btnDeleteSelected');
  if(deleteSelected) deleteSelected.onclick = ()=>{
    const n = selectedTxIds.size;
    if(!confirm(`選択した${n}件の取引を削除します。よろしいですか?(この操作は元に戻せません)`)) return;
    state.transactions = state.transactions.filter(t=>!selectedTxIds.has(t.id));
    selectedTxIds.clear();
    saveState();
    renderTabContent();
    toast(`${n}件削除しました`);
  };
  const applyBulk = document.getElementById('btnApplyBulkSource');
  if(applyBulk) applyBulk.onclick = ()=>{
    const { accountId, cardId } = parsePaymentSource(document.getElementById('bulkPaymentSource').value);
    if(!accountId && !cardId){ toast('支払元(口座またはカード)を選択してください'); return; }
    let updated = 0;
    selectedTxIds.forEach(id=>{
      const t = state.transactions.find(tx=>tx.id===id);
      if(t){ t.accountId = accountId; t.cardId = cardId; updated++; }
    });
    saveState();
    selectedTxIds.clear();
    renderTabContent();
    toast(`${updated}件の取引の支払元を更新しました`);
  };

  document.querySelectorAll('[data-edit]').forEach(btn=>{
    btn.onclick = ()=> openTxForm(state.transactions.find(t=>t.id===btn.dataset.edit));
  });
  document.querySelectorAll('[data-del]').forEach(btn=>{
    btn.onclick = ()=>{
      if(confirm('この取引を削除しますか?')){
        state.transactions = state.transactions.filter(t=>t.id!==btn.dataset.del);
        selectedTxIds.delete(btn.dataset.del);
        saveState(); renderTabContent(); toast('削除しました');
      }
    };
  });
}

function openCsvImportModal(){
  openModal(`
    <h3>CSVインポート</h3>
    <p class="help-text">PayPayカードなどの利用明細CSVを読み込みます。文字コードは自動判定(Shift_JIS / UTF-8)します。</p>
    <div class="field"><label>CSVファイル</label><input type="file" id="csvFile" accept=".csv,text/csv"></div>
    <div id="csvMappingArea"></div>
    <div class="modal-close-row">
      <button class="btn secondary" id="btnCancelCsv">キャンセル</button>
      <button class="btn" id="btnDoImport" style="display:none;">インポート実行</button>
    </div>
  `);
  document.getElementById('btnCancelCsv').onclick = closeModal;
  document.getElementById('csvFile').onchange = handleCsvFileSelect;
}

function decodeArrayBuffer(buf){
  // Try UTF-8 first; if it contains replacement chars, fall back to Shift_JIS.
  const utf8 = new TextDecoder('utf-8').decode(buf);
  if(!utf8.includes('\uFFFD')) return utf8;
  try{
    return new TextDecoder('shift_jis').decode(buf);
  }catch(e){
    return utf8;
  }
}

function parseCSV(text){
  const lines = text.split(/\r\n|\n|\r/).filter(l=>l.trim().length>0);
  return lines.map(line=>{
    // basic CSV split respecting simple quoted fields
    const cells = [];
    let cur = '', inQuotes = false;
    for(let i=0;i<line.length;i++){
      const ch = line[i];
      if(ch === '"'){ inQuotes = !inQuotes; }
      else if(ch === ',' && !inQuotes){ cells.push(cur); cur=''; }
      else cur += ch;
    }
    cells.push(cur);
    return cells.map(c=>c.trim());
  });
}

function normalizeDate(raw){
  if(!raw) return null;
  const s = raw.trim().replace(/\//g,'-');
  const m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m) return m[1] + '-' + m[2].padStart(2,'0') + '-' + m[3].padStart(2,'0');
  return null;
}
function normalizeAmount(raw){
  if(raw === undefined || raw === null) return NaN;
  const cleaned = String(raw).replace(/[¥,\s]/g,'');
  return Math.abs(parseFloat(cleaned));
}

let csvParsedRows = null;
function handleCsvFileSelect(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev)=>{
    const text = decodeArrayBuffer(ev.target.result);
    csvParsedRows = parseCSV(text);
    renderCsvMapping();
  };
  reader.readAsArrayBuffer(file);
}

function renderCsvMapping(){
  if(!csvParsedRows || !csvParsedRows.length) return;
  const header = csvParsedRows[0];
  const preview = csvParsedRows.slice(0, 6).map(r=>r.join(' | ')).join('\n');
  const colOptions = header.map((h,i)=>`<option value="${i}">${i}: ${h||'(空)'}</option>`).join('');

  document.getElementById('csvMappingArea').innerHTML = `
    <div class="help-text">先頭行はヘッダーとして扱います。日付・金額の列を指定してください。</div>
    <div class="csv-preview">${preview}</div>
    <div class="form-row section-gap">
      <div class="field"><label>日付の列</label><select id="colDate">${colOptions}</select></div>
      <div class="field"><label>金額の列</label><select id="colAmount">${colOptions}</select></div>
      <div class="field"><label>摘要の列(任意)</label><select id="colMemo"><option value="-1">(なし)</option>${colOptions}</select></div>
    </div>
    <div class="form-row">
      <div class="field">
        <label>取込データのカテゴリ(一括指定・後で個別変更可)</label>
        <select id="colCategory">${categoryOptionsGrouped('var_other')}</select>
      </div>
      <div class="field">
        <label id="colPaymentLabel">${paymentLabelFor('variable')}</label>
        <select id="colPayment"></select>
      </div>
    </div>
    <div class="form-row">
      <div class="field">
        <label>支払元・口座(任意・一括指定)</label>
        <select id="colPaymentSource">${paymentSourceOptionsHtml('', '')}</select>
      </div>
    </div>
  `;
  function refreshImportPaymentOptions(){
    const type = catById(document.getElementById('colCategory').value)?.type || 'variable';
    document.getElementById('colPaymentLabel').textContent = paymentLabelFor(type);
    const methods = paymentMethodsFor(type);
    const preferred = methods.includes('PayPayカード') ? 'PayPayカード' : methods[0];
    document.getElementById('colPayment').innerHTML = methods
      .map(p=>`<option value="${p}" ${p===preferred?'selected':''}>${p}</option>`).join('');
  }
  refreshImportPaymentOptions();
  document.getElementById('colCategory').onchange = refreshImportPaymentOptions;
  document.getElementById('btnDoImport').style.display = 'inline-block';
  document.getElementById('btnDoImport').onclick = executeCsvImport;

  // best-effort auto-detect
  const dateGuess = header.findIndex(h=>/日付|年月日|date|利用日/i.test(h||''));
  const amtGuess = header.findIndex(h=>/金額|amount|価格|利用金額/i.test(h||''));
  const memoGuess = header.findIndex(h=>/摘要|内容|店名|memo|加盟店/i.test(h||''));
  if(dateGuess>=0) document.getElementById('colDate').value = dateGuess;
  if(amtGuess>=0) document.getElementById('colAmount').value = amtGuess;
  if(memoGuess>=0) document.getElementById('colMemo').value = memoGuess;

  const paypayCard = state.cards.find(c=>/paypay|ペイペイ/i.test(c.name));
  if(paypayCard) document.getElementById('colPaymentSource').value = 'card:' + paypayCard.id;
}

// 日付・金額に加えてカテゴリも一致する場合のみ「重複」とみなす。
// (同じ日に別カテゴリでたまたま同額、というケースを誤って重複扱いしないため)
function findDuplicateTransaction(date, amount, categoryId){
  return state.transactions.find(t =>
    t.date === date &&
    Math.abs(t.amount - amount) < 1 &&
    (categoryId ? t.categoryId === categoryId : true)
  );
}

function executeCsvImport(){
  const dateIdx = parseInt(document.getElementById('colDate').value);
  const amtIdx = parseInt(document.getElementById('colAmount').value);
  const memoIdx = parseInt(document.getElementById('colMemo').value);
  const categoryId = document.getElementById('colCategory').value;
  const payment = document.getElementById('colPayment').value;
  const { accountId, cardId } = parsePaymentSource(document.getElementById('colPaymentSource').value);

  let imported = 0, skipped = 0;
  const duplicates = [];
  csvParsedRows.slice(1).forEach(row=>{
    const date = normalizeDate(row[dateIdx]);
    const amount = normalizeAmount(row[amtIdx]);
    if(!date || isNaN(amount) || amount <= 0){ skipped++; return; }
    const memo = memoIdx >= 0 ? (row[memoIdx]||'') : '';
    if(findDuplicateTransaction(date, amount, categoryId)){
      duplicates.push({ date, amount, memo, categoryId, payment, accountId, cardId });
      return;
    }
    state.transactions.push({ id: uid(), date, amount, categoryId, payment, memo, accountId, cardId, source:'csv' });
    imported++;
  });
  saveState();
  closeModal();
  renderTabContent();
  let msg = `${imported}件インポートしました`;
  if(skipped) msg += `(不正データ${skipped}件スキップ)`;
  if(duplicates.length) msg += ` / 重複の疑い${duplicates.length}件は取り込みませんでした`;
  toast(msg);
  if(duplicates.length) openDuplicateReviewModal(duplicates);
}

/* ================= Recurring transactions ================= */
function daysInMonth(ym){
  const [y,m] = ym.split('-').map(Number);
  return new Date(y, m, 0).getDate();
}
function recurringKey(ruleId, ym){ return ruleId + ':' + ym; }
function isRuleAppliedFor(ruleId, ym){
  return state.appliedRecurring.includes(recurringKey(ruleId, ym));
}
// 頻度が「指定した月のみ」(賞与など)の場合、その月に該当するかを判定
function ruleAppliesToMonth(rule, ym){
  if(rule.frequency === 'yearly'){
    const m = parseInt(ym.split('-')[1], 10);
    return Array.isArray(rule.months) && rule.months.includes(m);
  }
  return true;
}

function applyRecurringForMonth(ym){
  let count = 0, linked = 0;
  state.recurring.filter(r=>r.active !== false && ruleAppliesToMonth(r, ym)).forEach(rule=>{
    if(isRuleAppliedFor(rule.id, ym)) return;
    const day = clamp(rule.dayOfMonth, 1, daysInMonth(ym));
    const date = ym + '-' + String(day).padStart(2,'0');
    if(findDuplicateTransaction(date, rule.amount, rule.categoryId)){
      // 同日・同額・同カテゴリの取引が既にある(例: CSV取込済み)場合は二重登録せず「反映済み」として扱う
      state.appliedRecurring.push(recurringKey(rule.id, ym));
      linked++;
      return;
    }
    state.transactions.push({
      id: uid(), date, amount: rule.amount, categoryId: rule.categoryId,
      payment: rule.payment, memo: rule.memo || ('定期: ' + (rule.name||'')), source:'recurring',
      accountId: rule.accountId || null, cardId: rule.cardId || null, transferToAccountId: rule.transferToAccountId || null,
      recurringRuleId: rule.id
    });
    state.appliedRecurring.push(recurringKey(rule.id, ym));
    count++;
  });
  if(count > 0 || linked > 0) saveState();
  return { count, linked };
}
function pendingRecurringCount(ym){
  return state.recurring.filter(r=>r.active !== false && ruleAppliesToMonth(r, ym) && !isRuleAppliedFor(r.id, ym)).length;
}

// 今後(今月を含む)Nヶ月分の定期取引(確定要素)をまとめて反映する。
// 賞与など「指定した月のみ」のものは、対象月にだけ自動で反映される。
function applyRecurringForNextMonths(n){
  n = n || 12;
  const thisYm = todayStr().slice(0,7);
  let totalCount = 0, totalLinked = 0;
  const perMonth = [];
  for(let i=0;i<n;i++){
    const ym = shiftMonth(thisYm, i);
    const { count, linked } = applyRecurringForMonth(ym);
    if(count > 0 || linked > 0) perMonth.push({ ym, count, linked });
    totalCount += count; totalLinked += linked;
  }
  return { totalCount, totalLinked, perMonth };
}

function monthListLabel(months){
  return (months||[]).slice().sort((a,b)=>a-b).map(m=>m+'月').join('・');
}

      ${rows ? `

function afterRenderRecurring(){
  const applyBtn = document.getElementById('btnApplyRecurring');
  if(applyBtn) applyBtn.onclick = ()=>{
    const { count, linked } = applyRecurringForMonth(currentMonth);
    renderTabContent();
    toast(`${count}件反映しました${linked? `(${linked}件は取込済みのため紐付けのみ)`:''}`);
  };
  const applyNext12 = document.getElementById('btnApplyNext12');
  if(applyNext12) applyNext12.onclick = ()=>{
    if(!confirm('今月から12ヶ月先までの定期取引を、取引明細に先に登録します。よろしいですか?(既存の取引と重複するものは自動でスキップされます)')) return;
    const { totalCount, totalLinked } = applyRecurringForNextMonths(12);
    renderTabContent();
    toast(`${totalCount}件反映しました${totalLinked? `(${totalLinked}件は取込済みのため紐付けのみ)`:''}`);
  };
  const addBtn = document.getElementById('btnAddRecurring');
  if(addBtn) addBtn.onclick = ()=> openRecurringForm();
  document.querySelectorAll('[data-edit-rec]').forEach(btn=>{
    btn.onclick = ()=> openRecurringForm(state.recurring.find(r=>r.id===btn.dataset.editRec));
  });
  document.querySelectorAll('[data-del-rec]').forEach(btn=>{
    btn.onclick = ()=>{
      const ruleId = btn.dataset.delRec;
      if(!confirm('この定期取引を削除しますか?')) return;
      const today = todayStr();
      const futureTx = state.transactions.filter(t => t.recurringRuleId === ruleId && t.date > today);
      let deletedTx = 0;
      if(futureTx.length > 0 && confirm(`この定期取引から作成済みの未来日の予測取引が${futureTx.length}件あります。一緒に削除しますか?(過去・今月分は残ります)`)){
        state.transactions = state.transactions.filter(t => !(t.recurringRuleId === ruleId && t.date > today));
        deletedTx = futureTx.length;
      }
      state.recurring = state.recurring.filter(r=>r.id!==ruleId);
      saveState(); renderTabContent();
      toast(`削除しました${deletedTx ? `(未来の予測取引${deletedTx}件も削除)` : ''}`);
    };
  });
}

/* ================= Accounts (bank accounts / balances) ================= */
const ACCOUNT_TYPES = ['銀行口座','現金','その他'];

function accountById(id){ return state.accounts.find(a=>a.id===id); }
function lastDayOfMonth(ym){ return ym + '-' + String(daysInMonth(ym)).padStart(2,'0'); }

function computeAccountBalance(accountId, asOfDate){
  const acc = accountById(accountId);
  if(!acc) return null;
  let balance = acc.initialBalance || 0;
  const baseDate = acc.initialBalanceDate || '0000-01-01';
  // 口座に直接紐づく取引(カード経由でないもの)
  state.transactions
    .filter(t => t.accountId === accountId && !t.cardId && t.date > baseDate && t.date <= asOfDate)
    .forEach(t=>{
      const cat = catById(t.categoryId);
      if(!cat) return;
      balance += cat.type === 'income' ? t.amount : -t.amount;
    });
  // この口座を引落口座とするカードの利用分は、締め日・支払日に応じた引落日にまとめて反映
  state.cards.filter(c => c.linkedAccountId === accountId).forEach(card=>{
    state.transactions.filter(t => t.cardId === card.id).forEach(t=>{
      const debitDate = cardCycleDebitDate(card, t.date);
      if(debitDate > baseDate && debitDate <= asOfDate){
        const cat = catById(t.categoryId);
        if(!cat) return;
        balance += cat.type === 'income' ? t.amount : -t.amount;
      }
    });
  });
  // この口座を振替先とする取引(例: 積立口座への定期振替)は、送金元の減少とは別に入金として加算
  state.transactions
    .filter(t => t.transferToAccountId === accountId && t.date > baseDate && t.date <= asOfDate)
    .forEach(t=>{ balance += t.amount; });
  // 口座間振替ログ(積立の取り崩しなど、カテゴリを伴わない単純な口座間移動)
  state.transfers
    .filter(tr => tr.date > baseDate && tr.date <= asOfDate)
    .forEach(tr=>{
      if(tr.fromAccountId === accountId) balance -= tr.amount;
      if(tr.toAccountId === accountId) balance += tr.amount;
    });
  return balance;
}

// カードが「今まさに積み上がっている(まだ支払われていない)締めサイクル」がどの月かを判定
function cardOpenCycleMonth(card, dateStr){
  const [y,m,d] = dateStr.split('-').map(Number);
  const closing = clamp(card.closingDay, 1, daysInMonth(y+'-'+String(m).padStart(2,'0')));
  let cycleY = y, cycleM = m;
  if(d > closing){ cycleM += 1; if(cycleM>12){cycleM=1; cycleY++;} }
  return cycleY + '-' + String(cycleM).padStart(2,'0');
}

// 特定の口座について、指定した月ごとの「まだ反映していない定期取引」の純増減を返す
function pendingRecurringNetForAccountInMonth(accountId, ym){
  let net = 0;
  state.recurring.filter(r=>r.active !== false && ruleAppliesToMonth(r, ym) && !isRuleAppliedFor(r.id, ym)).forEach(r=>{
    if(r.accountId === accountId){
      const cat = catById(r.categoryId);
      const sign = (cat && cat.type === 'income') ? 1 : -1;
      net += sign * r.amount;
    }
    if(r.transferToAccountId === accountId){
      net += r.amount;
    }
  });
  return net;
}

// 登録済みの定期取引(未反映分)・カード利用の平均額・そして「予定」として手動で先に入力した
// 未来日の取引(取引明細に直接追加したもの)もすべて含めて、今後の月末残高を概算する
function projectAccountBalances(accountId, monthsAhead){
  monthsAhead = monthsAhead || 12;
  const acc = accountById(accountId);
  if(!acc) return null;
  const today = todayStr();
  const thisYm = today.slice(0,7);
  const startBalance = computeAccountBalance(accountId, today);

  // この口座を引落口座とするカードは、直近の実績サイクルの平均額を毎月の見積もり引落として使う
  const linkedCards = state.cards.filter(c=>c.linkedAccountId === accountId);
  let cardMonthlyEstimate = 0;
  linkedCards.forEach(card=>{
    const openCycle = cardOpenCycleMonth(card, today);
    const pastCycles = [1,2,3].map(n=>shiftMonth(openCycle, -n));
    const pastTotals = pastCycles.map(ym=>cardCycleTotal(card, ym)).filter(v=>v > 0);
    const estimate = pastTotals.length
      ? pastTotals.reduce((s,v)=>s+v,0) / pastTotals.length
      : cardCycleTotal(card, openCycle);
    cardMonthlyEstimate += estimate;
  });

  const series = [{ ym: thisYm, balance: startBalance }];
  let cumulativePendingRecurring = 0;
  let firstNegativeYm = (startBalance < 0) ? thisYm : null;
  for(let i=1;i<=monthsAhead;i++){
    const ym = shiftMonth(thisYm, i);
    cumulativePendingRecurring += pendingRecurringNetForAccountInMonth(accountId, ym);
    // 実績+すでに入力済みの「予定」取引(未来日で手動追加したものを含む)をそのまま反映
    const recorded = computeAccountBalance(accountId, lastDayOfMonth(ym));
    const bal = recorded + cumulativePendingRecurring - (cardMonthlyEstimate * i);
    series.push({ ym, balance: bal });
    if(firstNegativeYm === null && bal < 0) firstNegativeYm = ym;
  }

  return { series, cardMonthlyEstimate, firstNegativeYm, hasCardHistory: linkedCards.length > 0 };
}

// ある口座について、現在の残高と「これから確実に動く予定のお金」(手動で先に入れた予定取引を含む)を踏まえた残高不足を判定
function computeAccountAlert(accountId){
  const acc = accountById(accountId);
  if(!acc) return null;
  const today = todayStr();
  const thisYm = today.slice(0,7);
  const currentBalance = computeAccountBalance(accountId, today);

  // 近い将来(3ヶ月先まで)で、実際にマイナスへ落ち込むタイミングがないかをチェック
  const proj = projectAccountBalances(accountId, 3);
  const futureNegative = proj ? proj.series.slice(1).find(p => p.balance < 0) : null;

  // 今月まだ「反映」していない定期取引(この口座が支払元のもの)
  const pendingRecurring = state.recurring.filter(r=>
    r.active !== false && r.accountId === accountId && ruleAppliesToMonth(r, thisYm) && !isRuleAppliedFor(r.id, thisYm)
  ).map(r=>{
    const cat = catById(r.categoryId);
    const sign = (cat && cat.type === 'income') ? 1 : -1;
    return { name: r.name || (cat?cat.name:'定期取引'), amount: r.amount, signedAmount: sign*r.amount, day: r.dayOfMonth };
  });
  const pendingTransfersIn = state.recurring.filter(r=>
    r.active !== false && r.transferToAccountId === accountId && ruleAppliesToMonth(r, thisYm) && !isRuleAppliedFor(r.id, thisYm)
  ).map(r=>({ name: (r.name||'振替') + '(入金予定)', amount: r.amount, signedAmount: r.amount, day: r.dayOfMonth }));

  // 手動で追加した未来日の「予定」取引(この口座・カード・振替のいずれかに紐づくもの)
  const plannedFutureTx = state.transactions.filter(t => t.date > today && (
    t.accountId === accountId || t.transferToAccountId === accountId ||
    (t.cardId && cardById(t.cardId)?.linkedAccountId === accountId)
  )).sort((a,b)=> a.date.localeCompare(b.date));

  // この口座が引落口座になっているカードの、まだ支払われていない締めサイクルの利用額
  const upcomingCardPayments = state.cards.filter(c=>c.linkedAccountId === accountId).map(card=>{
    const cycleYm = cardOpenCycleMonth(card, today);
    const info = nextPaymentInfo(card, cycleYm);
    return { name: card.name, date: info.date, amount: info.amount };
  }).filter(p=>p.amount > 0);

  return {
    accountId, accountName: acc.name, currentBalance,
    isNegativeNow: currentBalance < 0,
    isProjectedNegative: !(currentBalance < 0) && !!futureNegative,
    projectedNegativeMonth: futureNegative ? futureNegative.ym : null,
    projectedNegativeBalance: futureNegative ? futureNegative.balance : null,
    upcomingCardPayments, pendingRecurring, pendingTransfersIn, plannedFutureTx
  };
}

function drawBalanceForecastChart(accountId){
  const canvas = document.getElementById('forecast-' + accountId);
  const noteEl = document.getElementById('forecastNote-' + accountId);
  if(!canvas) return;
  const proj = projectAccountBalances(accountId, 12);
  if(!proj) return;

  const dpr = window.devicePixelRatio || 1;
  const cssW = canvas.clientWidth || canvas.parentElement.clientWidth;
  const cssH = 150;
  canvas.width = cssW * dpr;
  canvas.height = cssH * dpr;
  canvas.style.height = cssH + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0,0,cssW,cssH);

  const padX = 10, padY = 14;
  const w = cssW - padX*2;
  const h = cssH - padY*2;
  const values = proj.series.map(p=>p.balance);
  const maxV = Math.max(...values, 0);
  const minV = Math.min(...values, 0);
  const range = (maxV - minV) || 1;
  const zeroY = padY + h - ((0 - minV) / range) * h;

  // ゼロライン
  ctx.strokeStyle = 'rgba(139,144,153,.35)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(padX, zeroY);
  ctx.lineTo(padX + w, zeroY);
  ctx.stroke();

  const stepX = proj.series.length > 1 ? w / (proj.series.length - 1) : 0;
  const points = proj.series.map((p,i)=>({
    x: padX + stepX * i,
    y: padY + h - ((p.balance - minV) / range) * h,
    v: p.balance
  }));

  // 塗り(マイナス域を淡く強調)
  ctx.beginPath();
  points.forEach((p,i)=>{ i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y); });
  const lineColor = proj.firstNegativeYm ? '#c97b4a' : '#4fb286';
  ctx.strokeStyle = lineColor;
  ctx.lineWidth = 2;
  ctx.stroke();

  points.forEach((p,i)=>{
    ctx.beginPath();
    ctx.arc(p.x, p.y, i===0?3.6:2.2, 0, Math.PI*2);
    ctx.fillStyle = p.v < 0 ? '#c75c5c' : lineColor;
    ctx.fill();
  });

  ctx.fillStyle = 'rgba(139,144,153,.8)';
  ctx.font = '10px JetBrains Mono, monospace';
  ctx.textAlign = 'center';
  proj.series.forEach((p,idx)=>{
    if(idx % 3 === 0){
      const [,m] = p.ym.split('-');
      ctx.fillText(Number(m) + '月', points[idx].x, cssH - 2);
    }
  });

  if(noteEl){
    const endBalance = proj.series[proj.series.length-1].balance;
    noteEl.innerHTML = `
      <p class="help-text">
        取引明細に実際に記録されている取引(手動で先に入力した未来日の「予定」取引を含む)と、
        まだ「反映」していない定期取引(給与・賞与・積立など)、
        ${proj.cardMonthlyEstimate ? `カードの平均利用見積もり(-${yen(proj.cardMonthlyEstimate)}/月)` : 'カード利用'}
        をもとにした概算です。突発的な支出や収入の変化までは含まれていません。
      </p>
      <p class="help-text">12ヶ月後の予測残高: <span class="mono ${endBalance>=0?'neutral':'neg'}">${yen(endBalance)}</span></p>
      ${proj.firstNegativeYm ? `<p class="help-text" style="color:var(--coral);">⚠ ${monthLabel(proj.firstNegativeYm)}頃に残高がマイナスになる見込みです。</p>` : ''}
    `;
  }
}

/* ================= Cards (credit/PayPay cards with settlement account) ================= */
function cardById(id){ return state.cards.find(c=>c.id===id); }

// そのカード利用日がどの締めサイクルに属し、実際にいつ口座から引き落とされるかを計算
function cardCycleDebitDate(card, txDate){
  const [y,m,d] = txDate.split('-').map(Number);
  let cycleY = y, cycleM = m;
  const closing = clamp(card.closingDay, 1, daysInMonth(y+'-'+String(m).padStart(2,'0')));
  if(d > closing){ cycleM += 1; if(cycleM>12){cycleM=1; cycleY++;} }
  let payY = cycleY, payM = cycleM + 1;
  if(payM>12){payM=1; payY++;}
  const payYm = payY+'-'+String(payM).padStart(2,'0');
  const payDay = clamp(card.paymentDay, 1, daysInMonth(payYm));
  return payYm + '-' + String(payDay).padStart(2,'0');
}
// 締め月(cycleYm)に属する利用期間(開始日翌日〜締め日)を返す
function cardCycleRange(card, cycleYm){
  const [y,m] = cycleYm.split('-').map(Number);
  const endDay = clamp(card.closingDay, 1, daysInMonth(cycleYm));
  const end = cycleYm + '-' + String(endDay).padStart(2,'0');
  let py = y, pm = m - 1; if(pm<1){pm=12; py--;}
  const prevYm = py + '-' + String(pm).padStart(2,'0');
  const startDay = clamp(card.closingDay, 1, daysInMonth(prevYm));
  const start = prevYm + '-' + String(startDay).padStart(2,'0');
  return { start, end };
}
function cardCycleTotal(card, cycleYm){
  const { start, end } = cardCycleRange(card, cycleYm);
  return state.transactions
    .filter(t => t.cardId === card.id && t.date > start && t.date <= end)
    .reduce((s,t)=> s + t.amount, 0);
}
function nextPaymentInfo(card, cycleYm){
  const [y,m] = cycleYm.split('-').map(Number);
  let payY = y, payM = m + 1; if(payM>12){payM=1; payY++;}
  const payYm = payY + '-' + String(payM).padStart(2,'0');
  const payDay = clamp(card.paymentDay, 1, daysInMonth(payYm));
  return { date: payYm + '-' + String(payDay).padStart(2,'0'), amount: cardCycleTotal(card, cycleYm) };
}

function paymentSourceOptionsHtml(selectedAccountId, selectedCardId){
  let html = `<option value="" ${(!selectedAccountId && !selectedCardId)?'selected':''}>(指定なし)</option>`;
  if(state.cards.length){
    html += `<optgroup label="カード">` + state.cards.map(c=>
      `<option value="card:${c.id}" ${selectedCardId===c.id?'selected':''}>${c.name}</option>`).join('') + `</optgroup>`;
  }
  if(state.accounts.length){
    html += `<optgroup label="口座(振込・引落)">` + state.accounts.map(a=>
      `<option value="account:${a.id}" ${selectedAccountId===a.id?'selected':''}>${a.name}</option>`).join('') + `</optgroup>`;
  }
  return html;
}
function parsePaymentSource(value){
  if(!value) return { accountId: null, cardId: null };
  if(value.startsWith('account:')) return { accountId: value.slice(8), cardId: null };
  if(value.startsWith('card:')) return { accountId: null, cardId: value.slice(5) };
  return { accountId: null, cardId: null };
}
function paymentSourceLabel(t){
  let base = null;
  if(t.cardId){ const c = cardById(t.cardId); base = c ? c.name + '(カード)' : null; }
  else if(t.accountId){ const a = accountById(t.accountId); base = a ? a.name : null; }
  if(t.transferToAccountId){
    const toAcc = accountById(t.transferToAccountId);
    if(toAcc) return (base || '(支払元未設定)') + ' → ' + toAcc.name;
  }
  return base;
}

/* ================= Data management (backup / restore) ================= */
function todayStr(){
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function exportData(){
  const dataStr = JSON.stringify(state, null, 2);
  const blob = new Blob([dataStr], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `money-flow-backup-${todayStr()}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('バックアップファイルを保存しました');
}

function importDataFromFile(file){
  const reader = new FileReader();
  reader.onload = (e)=>{
    let parsed;
    try{
      parsed = JSON.parse(e.target.result);
    }catch(err){
      toast('ファイルを読み込めませんでした(JSON形式ではありません)');
      return;
    }
    if(!parsed || !Array.isArray(parsed.categories) || !Array.isArray(parsed.transactions)){
      toast('このツール用のバックアップファイルではないようです');
      return;
    }
    if(!confirm('現在のデータをすべて置き換えます。よろしいですか?(この操作は元に戻せません)')) return;
    state = {
      categories: parsed.categories,
      transactions: parsed.transactions,
      settings: parsed.settings || {},
      recurring: parsed.recurring || [],
      appliedRecurring: parsed.appliedRecurring || [],
      accounts: parsed.accounts || [],
      cards: parsed.cards || [],
      transfers: parsed.transfers || [],
    };
    saveState();
    renderApp();
    toast('データを読み込みました');
  };
  reader.readAsText(file);
}

    <div class="panel">
      <h3>バックアップから復元</h3>
      <p class="help-text">以前保存したバックアップファイルを読み込みます。<strong style="color:var(--coral);">現在のデータはすべて上書きされます。</strong></p>
      <div class="field"><input type="file" id="importFile" accept="application/json,.json"></div>
      <button class="btn secondary" id="btnImportData">このファイルで復元する</button>
    </div>

    <div class="panel">
      <h3>すべてのデータを削除</h3>
      <p class="help-text">この端末に保存されている取引・カテゴリ・定期取引・設定をすべて消去し、初期状態に戻します。</p>
      <button class="btn danger" id="btnResetData">すべて削除してリセット</button>
    </div>
  `;
}

function afterRenderDataManagement(){
  const exportBtn = document.getElementById('btnExportData');
  if(exportBtn) exportBtn.onclick = exportData;

  const importBtn = document.getElementById('btnImportData');
  if(importBtn) importBtn.onclick = ()=>{
    const fileInput = document.getElementById('importFile');
    const file = fileInput.files[0];
    if(!file){ toast('ファイルを選択してください'); return; }
    importDataFromFile(file);
  };

  const resetBtn = document.getElementById('btnResetData');
  if(resetBtn) resetBtn.onclick = ()=>{
    if(!confirm('本当にすべてのデータを削除しますか?この操作は元に戻せません。')) return;
    if(!confirm('最終確認:バックアップは保存済みですか?削除を実行してよろしいですか?')) return;
    state = { categories: defaultCategories(), transactions: [], settings: {}, recurring: [], appliedRecurring: [], accounts: [], cards: [], transfers: [] };
    saveState();
    renderApp();
    toast('データを削除し、初期状態に戻しました');
  };

  const saveClientIdBtn = document.getElementById('btnDriveSaveClientId');
  if(saveClientIdBtn) saveClientIdBtn.onclick = ()=>{
    driveConfig.clientId = document.getElementById('driveClientId').value.trim();
    driveConfig.fileName = document.getElementById('driveFileName').value.trim() || 'money-flow-score-data.json';
    saveDriveConfig();
    toast('保存しました');
  };
  const driveSaveBtn = document.getElementById('btnDriveSave');
  if(driveSaveBtn) driveSaveBtn.onclick = async ()=>{
    driveConfig.clientId = document.getElementById('driveClientId').value.trim();
    driveConfig.fileName = document.getElementById('driveFileName').value.trim() || 'money-flow-score-data.json';
    saveDriveConfig();
    if(!driveConfig.clientId){ toast('クライアントIDを入力してください'); return; }
    const ok = await driveSaveJson();
    if(ok){ toast('Google Driveに保存しました'); renderTabContent(); }
  };
  const driveLoadBtn = document.getElementById('btnDriveLoad');
  if(driveLoadBtn) driveLoadBtn.onclick = async ()=>{
    driveConfig.clientId = document.getElementById('driveClientId').value.trim();
    driveConfig.fileName = document.getElementById('driveFileName').value.trim() || 'money-flow-score-data.json';
    saveDriveConfig();
    if(!driveConfig.clientId){ toast('クライアントIDを入力してください'); return; }
    const data = await driveLoadJson();
    if(data){
      if(!confirm(`Google Drive上の「${driveConfig.fileName}」で、この端末のデータを置き換えます。よろしいですか?`)) return;
      state = normalizeLoadedState_(data);
      saveState();
      renderApp();
      toast('Google Driveから読み込みました');
    }
  };
  const unlinkBtn = document.getElementById('btnDriveUnlink');
  if(unlinkBtn) unlinkBtn.onclick = ()=>{
    if(!confirm('リンクを解除しますか?(Drive上のファイル自体は削除されません)')) return;
    driveConfig.fileId = null;
    driveConfig.lastSavedAt = null;
    saveDriveConfig();
    renderTabContent();
    toast('リンクを解除しました');
  };
}

/* ================= init ================= */
renderApp();
</script>
</body>
</html>
